services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peliculas_app
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8001:8000"
    volumes:
      - ./:/var/www
    command: php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - peliculas_net

  db:
    image: mysql:8.0
    container_name: peliculas_db_container
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: peliculas_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3310:3306"
    networks:
      - peliculas_net

networks:
  peliculas_net:
    driver: bridge
